name: Publish to PyPI

# Publishes this package to PyPI when a version tag (e.g. v0.1.0) is pushed,
# using PyPI Trusted Publishing (OIDC) — no long-lived API token. Before the
# first tagged release, configure a PyPI "pending publisher" for this repo and a
# GitHub environment named "pypi" (see PUBLISHING.md).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build wheel + sdist
        run: uv build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
